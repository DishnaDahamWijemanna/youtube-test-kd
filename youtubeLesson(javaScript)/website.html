<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML CSS Review</title>
        <style>
            .red-button{
                background-color: red;
                color: white;
                border:none;
            }
            .yellow-button{
                background-color: rgba(255, 255, 0, 0.553);
                color:black;
                border:1px solid rgba(0, 0, 0, 0.278);
            }
            .yellow-button:hover{
                background-color: yellow;
                color:black;
                border:1px solid rgba(0, 0, 0, 0.278);
            }
        </style>
    </head>
    <body>
        <button title="tooltip" class="red-button">Hello</button>
        <p>paragraph of <button class="yellow-button">hello</button> text</p>
    </body>
</html>
